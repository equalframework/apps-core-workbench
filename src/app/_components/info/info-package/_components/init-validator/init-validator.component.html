<div class="info-header-section">
    <div class="info-header-row info-header-top-row">
        <div class="info-header-left">
            <span class="info-header-label">Initialization</span>
            <span class="info-header-main">{{ data.package }}</span>
        </div>
        <div class="info-header-right">
            <!-- placeholder for potential icon buttons -->
        </div>
    </div>

    <div class="info-header-row info-header-description">
        <div class="warning">
            Initializing a package can replace apps/routes of another package by the package's apps/routes if they have the same name.
        </div>
        <div>
            Are you sure you want to initialize <strong>{{ data.package }}</strong> ?
        </div>
    </div>

    <div class="info-header-row checkbox-block">
        <div class="checkbox-row">
            <mat-checkbox [checked]="csd" (change)="csd = $event.checked; csd ? 1 : impcsd = false">Cascade initialization</mat-checkbox>
        </div>
        <div class="checkbox-row">
            <mat-checkbox *ngIf="csd" [checked]="impcsd" (change)="impcsd = $event.checked">Cascade import init data</mat-checkbox>
        </div>
        <div class="checkbox-row">
            <mat-checkbox [checked]="imprt" (change)="imprt = $event.checked">Import init data</mat-checkbox>
        </div>
    </div>

    <div class="info-header-row" style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:12px;">
        <button mat-button [mat-dialog-close]="undefined">cancel</button>
        <button mat-button color="primary" [mat-dialog-close]="{import:imprt,cascade:csd,imprtcsd:impcsd}">initialize</button>
    </div>
</div>
