<div *ngIf="loading" class="loader"><mat-spinner></mat-spinner></div>

<ng-container *ngIf="!loading && !package">
    Select a package amongst the list to see its details.
</ng-container>

<ng-container *ngIf="!loading && package">
    <div class="info-package-container">
        <app-info-header
            [titleLabel]="'Package'"
            [title]="package.name"
            [copyText]="package.name"
            [description]="''"
            [extraInfo]="headerExtraInfo"
            [statusInfo]="headerStatus"
            [showEditTranslationButtons]="false"
            (extraClick)="onHeaderExtraClick($event)">
        </app-info-header>

        <app-info-sub-header
            [navigationButtons]="navigationButtons"
            [actionButtons]="actionButtons"
            [showManagement]="true"
            (navigationClick)="onSubHeaderNavigation($event)">
        </app-info-sub-header>
        <div class="info-body-section">
            
            <ng-container *ngIf="!consistency_loading && consistency_checked">
                <div class="consistency-section">
        
                    <div class="consistency-header">
                        <p class="section-label">Consistency check</p>
                        <div class="filters">
                            <label class="toggle-chip chip-warning"
                                *ngIf="warn_count > 0"
                                [class.checked]="show_warnings"
                                (click)="show_warnings = !show_warnings">
                                <span class="chip-count">{{warn_count}}</span> Warnings
                            </label>
                            <label class="toggle-chip chip-error"
                                *ngIf="error_count > 0"
                                [class.checked]="show_errors"
                                (click)="show_errors = !show_errors">
                                <span class="chip-count">{{error_count}}</span> Errors
                            </label>
                            <div class="chip-divider"></div>
                            <label class="toggle-chip" [class.checked]="show_dbms" (click)="show_dbms = !show_dbms">DBMS</label>
                            <label class="toggle-chip" [class.checked]="show_orm"  (click)="show_orm  = !show_orm">ORM</label>
                            <label class="toggle-chip" [class.checked]="show_i18n" (click)="show_i18n = !show_i18n">I18N</label>
                            <label class="toggle-chip" [class.checked]="show_gui"  (click)="show_gui  = !show_gui">GUI</label>
                        </div>
                    </div>
        
                    <div class="no-issues" *ngIf="error_count === 0 && warn_count === 0">
                        <mat-icon>check_circle</mat-icon>
                        <span>No errors or warnings found</span>
                    </div>
        
                    <div class="items" *ngIf="error_count !== 0 || warn_count !== 0">
                        <label *ngFor="let item of filtered_error_list"
                            class="item"
                            [class.color-red]="item.type == 2"
                            [class.color-orange]="item.type == 1"
                            [class.selected]="item === selectedConsistencyResultItem"
                            (click)="selectConsistencyResultItem(item)">
                            <mat-icon class="item-icon">{{item.type == 2 ? 'error' : 'warning'}}</mat-icon>
                            {{item.text}}
                        </label>
                    </div>
        
                </div>
            </ng-container>
        
            <div class="summary-section">
                <p class="section-label">Package summary</p>
                <ng-container *ngIf="packageInfos$ | async as packageInfos">
                    <summary-package
                        [packageInfo]="packageInfos.response"
                        [message]="packageInfos.message">
                    </summary-package>
                </ng-container>
            </div>

        </div>
    </div>
</ng-container>
