<div class="dashboard-container">

  <ng-container *ngIf="groupedLayout">
    <div class="layout-root">

        <div class="group-block" *ngFor="let group of groupedLayout.layout.groups; let gi = index">

            <!-- Single section: display content without tabs -->
            <ng-container *ngIf="group.sections && group.sections.length === 1">
                <div class="section-body" *ngFor="let section of group.sections">
                    <div class="row-wrap" *ngFor="let row of section.rows">
                        <div class="col-wrap" 
                             [style.flex-basis]="col.width"
                             [style.text-align]="col.align"
                             *ngFor="let col of row.columns">
                            <div class="item-wrap" 
                                 [style.width]="item.width"
                                 *ngFor="let item of col.items">
                                <span class="item-type type-{{ item.type }}">{{ item.type }}</span>
                                <span class="item-value">{{ item.value }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>

            <!-- Multiple sections: display as tabs -->
            <mat-tab-group class="sections-tab-group" *ngIf="group.sections && group.sections.length > 1">
                <mat-tab *ngFor="let section of group.sections; let si = index">
                    <ng-template mat-tab-label>
                        {{ section.label || 'Section ' + (si + 1) }}
                    </ng-template>

                    <!-- Rows → columns → items with proper width -->
                    <div class="section-body">
                        <div class="row-wrap" *ngFor="let row of section.rows">
                            <div class="col-wrap" 
                                 [style.flex-basis]="col.width"
                                 [style.text-align]="col.align"
                                 *ngFor="let col of row.columns">
                                <div class="item-wrap" 
                                     [style.width]="item.width"
                                     *ngFor="let item of col.items">
                                    <span class="item-type type-{{ item.type }}">{{ item.type }}</span>
                                    <span class="item-value">{{ item.value }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </mat-tab>
            </mat-tab-group>

        </div>

    </div>
</ng-container>

<ng-container *ngIf="simpleLayout">
    <div class="layout-root simple-layout">
        <div class="group-block">
            <div class="sections-wrap">
                <div class="section-block">
                    <div class="section-header">
                        <span class="section-label">{{ simpleLayout.name }}</span>
                    </div>

                    <div class="section-body simple-grid">
                        <div class="item-wrap simple-item" *ngFor="let item of simpleLayout.layout.items">
                            <span class="item-type type-{{ item.type }}">{{ item.type }}</span>
                            <span class="item-value">{{ item.value }}</span>
                            <div class="item-meta">
                                <span class="item-width" *ngIf="item.width">{{ item.width }}</span>
                                <span class="item-property" *ngIf="item.widget?.link" title="Link field">🔗</span>
                                <span class="item-property" *ngIf="item.widget?.boolean" title="Boolean field">✓</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ng-container>

  </div>
