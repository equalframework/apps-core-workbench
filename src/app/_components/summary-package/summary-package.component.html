<div *ngIf="packageInfo as pkg; else noData">

  <!-- Meta fields: compact two-column layout -->
  <table class="meta-table">
      <tbody>
          <tr>
              <td class="meta-key">Description</td>
              <td class="meta-value">{{ pkg.description || '—' }}</td>
          </tr>
          <tr>
              <td class="meta-key">Version</td>
              <td class="meta-value">{{ pkg.version || '—' }}</td>
          </tr>
          <tr>
              <td class="meta-key">Authors</td>
              <td class="meta-value">
                  <ng-container *ngIf="(pkg.authors?.length ?? 0) > 0; else dash">
                      <span class="pill" *ngFor="let author of pkg.authors">{{ author }}</span>
                  </ng-container>
              </td>
          </tr>
          <tr>
              <td class="meta-key">Dependencies</td>
              <td class="meta-value">
                  <ng-container *ngIf="(pkg.depends_on?.length ?? 0) > 0; else dash">
                      <span class="pill pill-dep" *ngFor="let dep of pkg.depends_on">{{ dep }}</span>
                  </ng-container>
              </td>
          </tr>
      </tbody>
  </table>

  <ng-template #dash><span class="empty-val">—</span></ng-template>

  <!-- Applications -->
  <ng-container *ngIf="(pkg.apps?.length ?? 0) > 0">
      <p class="sub-section-label">Applications</p>
      <div class="apps-grid">
          <div class="app-tile" *ngFor="let app of pkg.apps">
              <div class="app-icon-wrap">
                  <mat-icon>{{ app.appIcon || 'apps' }}</mat-icon>
              </div>
              <div class="app-info">
                  <span class="app-name">{{ app.appName }}</span>
                  <span class="app-desc">{{ app.appDescription || 'No description' }}</span>
              </div>
          </div>
      </div>
  </ng-container>

</div>

<ng-template #noData>
  <p class="empty-val">No information available.</p>
</ng-template>
