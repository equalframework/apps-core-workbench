<div *ngIf="error">
    Something went wrong...
</div>

<div *ngIf="loading" style="display: flex; align-items: center; justify-content: center; flex-direction: column;" class="full">
    <mat-spinner></mat-spinner>
    <label style="font-size: 20px; margin-top: 1em;">Loading...</label>
</div>
<app-classic-layout *ngIf="!loading" style="height: 100% !important;">
    <app-param-list class="list"
            [list]="paramList"
            [selectedIndex]="selectedIndex"
            (select)="onSelection($event)"
            (CRUD)="onChange($event)">
    </app-param-list>

    <div sidepane>
        <app-param-side-pane *ngIf="paramList && paramList.length > 0"
                [param]="paramList[selectedIndex]"
                [types]="types"
                [usages]="usages"
                [scheme]="sch"
                [package]="controllerPackage"
                [entityName]="controllerName"
                [modelList]="modelList"
                (CRUD)="onChange($event)">
        </app-param-side-pane>
        
        <div *ngIf="!paramList || paramList.length === 0" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999;">
            <p>No parameters available</p>
        </div>
    </div>
</app-classic-layout>
