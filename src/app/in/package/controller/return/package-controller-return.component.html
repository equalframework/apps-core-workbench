<div class="scrollable-part">
    <!-- HTTP Header Section -->
    <div class="part">
        <div class="part-title">
            <mat-icon>http</mat-icon>
            <label>HTTP Header</label>
        </div>
        <div class="part-content">
            <div class="form-row">
                <type-input [appFocusableField]="'response-header-content_type'"
                    class="field-width-20"
                    type="string"
                    name="content-type"
                    [value]="object.contentType"
                    (changed)="changeContentType($event)">
                </type-input>
                <type-input [appFocusableField]="'response-header-charset'"
                    class="field-width-20"
                    type="string"
                    name="charset"
                    [value]="object.charset"
                    (changed)="changeCharset($event)">
                </type-input>
            </div>
            <type-input [appFocusableField]="'response-header-accept_origin'"
                type="array"
                name="accept-origin"
                [value]="object.acceptOrigin"
                (changed)="changeAcceptOrigin($event)">
            </type-input>
        </div>
    </div>

    <!-- Schema Section -->
    <div class="part">
        <div class="part-title">
            <mat-icon>schema</mat-icon>
            <label>Schema</label>
        </div>
        <div class="part-content">
            <!-- Return Type Selection -->
            <div class="form-row">
                <mat-form-field class="field-width-20">
                    <mat-label>Return type</mat-label>
                    <input matInput [appFocusableField]="'response-schema-return_type'" (keydown)="noCancel($event)" [formControl]="typeControl" [matAutocomplete]="auto">
                    <mat-autocomplete #auto>
                        <mat-optgroup *ngIf="filteredTypesCustom.length > 0" label="Return types">
                            <mat-option *ngFor="let type of filteredTypesCustom" [value]="type">{{type}}</mat-option>
                        </mat-optgroup>
                        <mat-optgroup *ngIf="filteredTypesRegular.length > 0" label="Classic types">
                            <mat-option *ngFor="let type of filteredTypesRegular" [value]="type">{{type}}</mat-option>
                        </mat-optgroup>
                    </mat-autocomplete>
                </mat-form-field>

                <mat-form-field>
                    <mat-label>Quantity</mat-label>
                    <mat-select [value]="object.qty" (valueChange)="changeQty($event)" [appFocusableField]="'response-schema-qty'">
                        <mat-option value="one">one</mat-option>
                        <mat-option value="many">many</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <!-- Type-specific Fields -->
            <app-usages
                *ngIf="typesRegular.includes(object.type)"
                [usage]="object.usage"
                [type]="object.type"
                (CRUD)="onChange($event)"
                name="usage">
            </app-usages>

            <autocomplete
                *ngIf="object.type === 'entity'"
                name="Entity"
                [value]="object.entity"
                (updateValue)="changeEntity($event)"
                [values]="entities">
            </autocomplete>

            <!-- Format Toggle for 'any' Type -->
            <mat-slide-toggle
                *ngIf="object.type === 'any'"
                [checked]="object._hasValues"
                (change)="changeHasFormat($event.checked)">
                Add Format
            </mat-slide-toggle>

            <!-- Format Items (nested section) -->
            <div *ngIf="object.type === 'any' && object._hasValues" class="subpart">
                <div class="subpart-title">
                    <mat-icon>list</mat-icon>
                    <span>Format Fields</span>
                </div>

                <button class="mb-1" mat-stroked-button color="primary" (click)="addFormatItem()">
                    <mat-icon>add</mat-icon> 
                    Add field
                </button>

                <mat-accordion>
                    <mat-expansion-panel *ngFor="let item of object.values ?? []; index as index">
                        <mat-expansion-panel-header>
                            <mat-panel-title>
                                <div class="typeinfo">
                                    <mat-icon>
                                        {{typeIconList[item.type] ? typeIconList[item.type] : "category"}}
                                    </mat-icon>
                                </div>
                                <label [style.opacity]="item.name ? 1 : 0.5">
                                    {{item.name ? item.name : "(no name)"}}
                                </label>
                            </mat-panel-title>
                            <mat-panel-description>
                                <label [style.opacity]="item.description ? 1 : 0.5">
                                    {{item.description ? item.description : "(no description)"}}
                                </label>
                            </mat-panel-description>
                            <div class="deletebuttoncontainer" matRipple>
                                <mat-icon class="deletebutton" (click)="deleteFormatItem(index); $event.stopPropagation()">
                                    delete
                                </mat-icon>
                            </div>
                        </mat-expansion-panel-header>

                        <!-- Format Item Details -->
                        <div class="form-row">
                            <mat-form-field class="field-width-20">
                                <mat-label>Name</mat-label>
                                <input matInput [value]="item.name" (change)="changeFormatName(index, $event.target.value)" (keydown)="noCancel($event)">
                            </mat-form-field>
                            <mat-form-field class="field-width-50">
                                <mat-label>Description</mat-label>
                                <input matInput [value]="item.description" (change)="changeFormatDescription(index, $event.target.value)" (keydown)="noCancel($event)">
                            </mat-form-field>
                        </div>

                        <!-- Type and Usage -->
                        <div class="form-row">
                            <autocomplete
                                name="type"
                                [value]="item.type"
                                [values]="typesRegular"
                                (valueChange)="changeFormatType(index, $event)">
                            </autocomplete>
                            <app-usages
                                name="format item {{index}}"
                                [usage]="item.usage"
                                [type]="item.type"
                                (CRUD)="onChange($event)">
                            </app-usages>
                        </div>

                        <!-- Selection Toggle -->
                        <mat-checkbox [checked]="item._hasSelection" (change)="changeHasSelection(index, $event.checked)">
                            has selection
                        </mat-checkbox>

                        <!-- Selection Items (nested) -->
                        <mat-accordion *ngIf="item._hasSelection" class="mt-2">
                            <button class="mb-1" mat-stroked-button color="primary" (click)="addFormatSelectionItem(index)">
                                <mat-icon>add</mat-icon> 
                                Add selection item
                            </button>

                            <mat-expansion-panel *ngFor="let sel of item.selection; index as jndex">
                                <mat-expansion-panel-header>
                                    <mat-panel-title>
                                        <label>Selection item {{jndex}}</label>
                                    </mat-panel-title>
                                    <mat-panel-description>
                                        {{sel ? "value: " + sel : "no value"}}
                                    </mat-panel-description>
                                    <div class="deletebuttoncontainer" matRipple>
                                        <mat-icon class="deletebutton" (click)="deleteFormatSelectionItem(index, jndex); $event.stopPropagation()">
                                            delete
                                        </mat-icon>
                                    </div>
                                </mat-expansion-panel-header>
                                <type-input
                                    name="Selection item {{jndex}}"
                                    [value]="sel"
                                    (changed)="changeSelectionItem(index, jndex, $event)">
                                </type-input>
                            </mat-expansion-panel>
                        </mat-accordion>
                    </mat-expansion-panel>
                </mat-accordion>
            </div>
        </div>
    </div>
</div>
