<app-popup-layout
    [okButton]="true"
    okButtonText="Save"
    (close)="dialogRef.close()"
    (ok)="dialogRef.close(editingItem)"
>
    <app-item-editor
    [item]="editingItem"
    [fields]="data.fields"
    [entity]="data.package + '\\' + data.entity"
    [types]="types"
    [groups]="data.groups"
    [actionControllers]="data.action_controllers"
    [scheme]="data.schema"
    >
    </app-item-editor>
</app-popup-layout>
