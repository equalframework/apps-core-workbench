<label>{{label}}</label>
<button
    mat-icon-button
    color="primary"
    class="action-button"
    (click)="create()"
    [attr.aria-label]="'Add predefined action in ' + label"
><mat-icon>add</mat-icon></button>
<div class="indent">
    <label *ngIf="acts.length === 0">No custom actions bound.</label>
    <div *ngFor="let action of acts">
        <app-predef-action-editor 
            [obj]="action"
            [controllers]="controllers"
            (delete)="del(action)"
            [groups]="groups"
            [entity]="entity"
            [ids]="ids"
        ></app-predef-action-editor>
        <div class="spacepls"></div>
    </div>
</div>
