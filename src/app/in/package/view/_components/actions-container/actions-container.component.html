<div class="header"> 
    <label>{{label}}</label>
    <button
        mat-icon-button
        color="primary"
        class="addItem action-button"
        (click)="create()"
        [attr.aria-label]="'Add action in ' + label"
    ><mat-icon>add</mat-icon></button>
</div>
<div class="indent">
    <label *ngIf="acts.length === 0" class="info">No custom actions bound.</label>
    <div *ngFor="let action of acts">
        <app-action-editor 
            [obj]="action"
            [controllers]="controllers"
            (delete)="del(action)"
            [groups]="groups"
            [packageName]="packageName"
            [entity]="entity"
            [actionIndex]="acts.indexOf(action)"
            appScrollTarget="{{action.id}}"
        ></app-action-editor>
        <div class="spacepls"></div>
    </div>
</div>
