<div *ngIf="route" class="route-container">
    <div class="route-header">
        <div class="drag">
            <mat-icon cdkDragHandle>drag_indicator</mat-icon>
        </div>

        <div class="route-fields">
            <mat-form-field class="longfield">
                <mat-label>id</mat-label>
                <input matInput appFocusableField="routes-{{route.id}}-id" [(ngModel)]="route.id">
            </mat-form-field>

            <mat-form-field class="longfield">
                <mat-label>route</mat-label>
                <input matInput appFocusableField="routes-{{route.id}}-route" [(ngModel)]="route.route">
            </mat-form-field>

            <mat-form-field class="longfield">
                <mat-label>label</mat-label>
                <input matInput appFocusableField="routes-{{route.id}}-label" [(ngModel)]="route.label">
            </mat-form-field>

            <mat-form-field class="longlongfield">
                <mat-label>description</mat-label>
                <input matInput appFocusableField="routes-{{route.id}}-description" [(ngModel)]="route.description">
            </mat-form-field>

            <div class="icon-preview">
                <mat-icon>{{ route.icon }}</mat-icon>
                <mat-form-field class="longfield">
                    <input matInput appFocusableField="routes-{{route.id}}-icon" placeholder="icon" [value]="route.icon" 
                           (keyup)="route.icon = $event.target.value">
                    <a matSuffix href="https://fonts.google.com/icons?icon.set=Material+Icons" 
                       target="_blank">
                        <mat-icon class="help">help</mat-icon>
                    </a>
                </mat-form-field>
            </div>
        </div>

        <div class="checkboxes">
            <app-toggling-button
                *ngIf="route._has_context || route._has_visible"
                [enabledIcon]="'expand_less'"
                [disabledIcon]="'expand_more'"
                [baseState]="bigDisp"
                (toggle)="bigDisp = $event"
                [disabled]="false">
            </app-toggling-button>

            <mat-checkbox [(ngModel)]="route._has_context" appFocusableField="routes-{{route.id}}-has_context"
                         (change)="bigDisp = true">
                context
            </mat-checkbox>

            <mat-checkbox [(ngModel)]="route._has_visible" appFocusableField="routes-{{route.id}}-has_visible"
                         (change)="bigDisp = true">
                visibility
            </mat-checkbox>
        </div>

        <div class="remove">
            <button mat-icon-button color="warn" class="action-button action-button--delete" (click)="onClickDelete()">
                <mat-icon>delete</mat-icon>
            </button>
        </div>
    </div>

    <ng-container *ngIf="bigDisp">
        <div *ngIf="route._has_visible" class="visible-drawer">
            <label>Visibility</label>
            <app-property-domain-component
                [value]="route.visible.dom"
                [name]="'oui'"
                [class]="packageName + '\\' + entity"
                (valueChange)="route.visible.dom = $event">
            </app-property-domain-component>
        </div>

        <div *ngIf="route._has_context" class="context-drawer">
            <label>Context</label>

            <div class="context-drawer-fields">
                <mat-form-field class="longlongfield">
                    <mat-label>Entity</mat-label>
                    <input matInput
                           [matAutocomplete]="auto"
                           [(ngModel)]="route.context.entity"
                           (keyup)="updateAutocomplete(route.context.entity)" />
                    <mat-autocomplete #auto="matAutocomplete" (optionSelected)="refreshViewList($event.option.value)">
                        <mat-option *ngFor="let model of filteredModelList" [value]="model">
                            {{ model }}
                        </mat-option>
                    </mat-autocomplete>
                </mat-form-field>

                <mat-form-field class="longlongfield">
                    <mat-label>View</mat-label>
                    <mat-select [(ngModel)]="route.context.view" [disabled]="extEntityViewList.length === 0">
                        <mat-option *ngFor="let view of extEntityViewList" 
                                   [value]="view.split(':')[1]">
                            {{ view }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <div class="context-drawer-checkboxes">
                <mat-checkbox [(ngModel)]="route.context._has_domain">
                    domain
                </mat-checkbox>
                <mat-checkbox [(ngModel)]="route.context.reset">
                    reset
                </mat-checkbox>
            </div>

            <div *ngIf="route.context._has_domain">
                <app-property-domain-component
                    [value]="route.context.domain.dom"
                    [name]="'oui'"
                    [class]="packageName + '\\' + entity"
                    (valueChange)="route.context.domain.dom = $event">
                </app-property-domain-component>
            </div>
        </div>
    </ng-container>
</div>
