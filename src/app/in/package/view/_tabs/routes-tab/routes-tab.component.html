<div class="tab-item indent" #routesTabContainer >
  <div class="toggle-container tab-header">
    <mat-slide-toggle [(ngModel)]="viewObj._has_routes"></mat-slide-toggle>
    <label [style.opacity]="viewObj._has_routes ? 1 : 0.6" 
      class="category-title maincolor">Routes </label>
  </div>
  <div *ngIf="viewObj._has_routes" class="indent">
    <app-route-editor
      [obj]="viewObj.routes"
      [package_name]="package_name"
      [entity]="entity">
    </app-route-editor>
  </div>
</div>
