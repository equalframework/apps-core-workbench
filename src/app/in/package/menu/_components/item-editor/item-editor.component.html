<button class="item-pretty" 
        [class.selected]="selectedItem && selectedItem === item" 
        (click)="select.emit(item)" appScrollTarget="{{item.id}}">
    <div class="real-holder">
        <mat-icon *ngIf="item.icon" class="item-icon">{{item.icon}}</mat-icon>
        <div class="item-content">
            <label class="item-label">{{item.label}}</label>
        </div>
    </div>
    
    <div class="actions">
        <button *ngIf="item.type === 'parent'" 
                mat-icon-button 
                color="primary" 
                (click)="addChild(); $event.stopPropagation()"
                matTooltip="Add child">
            <mat-icon>add</mat-icon>
        </button>
        <button mat-icon-button
                (click)="onDelete()">
            <mat-icon>delete</mat-icon>
        </button>
    </div>
</button>

<div *ngIf="item.type === 'parent'" 
     class="indent"
     cdkDropList
     [cdkDropListData]="item.children"
     (cdkDropListDropped)="drop($event)" >
    <app-item-editor cdkDrag  
                     *ngFor="let child of item.children; index as i"
                     [item]="child"
                     [selectedItem]="selectedItem"
                     (select)="select.emit($event)"
                     (deleteMe)="deleteChild(i)">
    </app-item-editor>
</div>
