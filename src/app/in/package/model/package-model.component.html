<div class="app-inner-header">
    <app-inner-header
            [customButton]="true"
            [buttonBack]="true"
            (onButtonBack)="getBack()">
        <label class="package-label">{{ packageName }}</label>›<label class="model-label"><mat-icon>data_object</mat-icon>Models</label>
    </app-inner-header>
</div>

<div class="app-inner-body">

    <div class="left_pane">
        <search-mixed-list
                [node_type]="'class'"
                [package_name]="packageName"
                (selectNode)="onSelectNode($event)">
        </search-mixed-list>
    </div>

    <div class="right_pane">
        <info-model *ngIf="selectedClass" [model]="selectedClass"></info-model>
        <info-system *ngIf="!selectedClass" [component_type]="'class'" [package_name]="packageName"></info-system>
    </div>
</div>
