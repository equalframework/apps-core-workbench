<mat-grid-list [cols]="totalCols" rowHeight="2em" gutterSize="8px">
  <mat-grid-tile colspan="1">
    <mat-checkbox
      [checked]="item.is_active"
      (change)="item.is_active = $event.checked">
    </mat-checkbox>
  </mat-grid-tile>

  <mat-grid-tile colspan="2">
    <label class="fieldnamelabel">{{ fieldName }}</label>
  </mat-grid-tile>

  <ng-container *ngIf="item.is_active">
    <mat-grid-tile
      *ngFor="let field of fields"
      [colspan]="field.colspan"
      class="editable-cell">
      <input
        matInput
        [placeholder]="field.placeholder"
        [(ngModel)]="item[field.key].value"
        spellcheck="true">
    </mat-grid-tile>
  </ng-container>

  <ng-container *ngIf="!item.is_active">
    <mat-grid-tile [colspan]="remainingCols" class="placeholder"></mat-grid-tile>
  </ng-container>

</mat-grid-list>
