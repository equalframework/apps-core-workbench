<mat-grid-list [cols]="totalCols" rowHeight="2em" gutterSize="8px">
  <mat-grid-tile
    *ngFor="let col of computedHeaders"
    [colspan]="col.colspan"
    class="header-tile">
    {{ col.label }}
  </mat-grid-tile>
</mat-grid-list>

<app-translation-item
  *ngFor="let key of itemKeys"
  [item]="items[key]"
  [fieldName]="key"
  [fields]="fields"
  [totalCols]="totalCols">
</app-translation-item>
