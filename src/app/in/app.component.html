
<div class="app-inner-header">
    <app-inner-header
            [customButton]="true">
        <div class="header-labels">
            <span *ngIf=" !hasAnyFilters() && !search_terms.length">
                All components
            </span>
            <span *ngIf="search_scope || hasAnyFilters() || search_terms.length">
                All
                <span *ngIf="search_scope" 
                      [class]="'component-color-' + getScopeComponentType() + ' colorized'">
                    {{ getComponentTypeName(search_scope) }}
                </span>
                <span *ngIf="!search_scope">components</span>
            </span>
            <ng-container *ngIf="hasAnyFilters()">
                from
                <span *ngFor="let filterKey of getFilterKeys(); let last = last" class="filter-item">
                    <span [class]="getFilterValueClass(filterKey)">
                        {{ search_filters[filterKey] }}
                    </span>
                    <span *ngIf="!last">,</span>
                </span>
            </ng-container>
            <span *ngIf="search_terms[0] && search_terms[0].trim() !== ''">
                matching <span class="search-term-highlight">{{ search_terms.join(', ') }}</span>
            </span>
        </div>
    </app-inner-header>
</div>


<div class="app-inner-body">

    <div class="left_pane">

        <search-mixed-list
                class="package"
                [node_selected]="selectedComponent"
                (selectNode)="selectNode($event)"
                (refresh)="refresh()"
                (searchScopeChange)="handleSearchScopeChange($event)"
                (searchFiltersChange)="handleSearchFiltersChange($event)"
                (searchTermsChange)="handleSearchTermsChange($event)">
        </search-mixed-list>

    </div>

    <div *ngIf="!selectedComponent" class="right_pane">
        <info-system [component_type]="search_scope"></info-system>
    </div>

    <div *ngIf="selectedComponent" class="right_pane">

        <ng-container *ngIf="selectedComponent.type == 'package' || selectedComponent.type == ''">
            <info-package
                    [package]="selectedComponent"
                    [package_init_list]="initialized_packages"
                    [key]="package_name">
            </info-package>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type === 'class'">
            <info-model
                    [model]="selectedComponent"
                    (getRef)="goTo($event)">
            </info-model>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type == 'do' || selectedComponent.type == 'get'">
            <info-controller
                    [controller]="selectedComponent"
                    [fetch_error]="fetch_error"
                    [selected_package]="selectedComponent.package ? selectedComponent.package : ''"
                    [moving]="true"
                    (goto)="goTo({name:$event})">
            </info-controller>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type === 'route'">
            <info-route
                    [route]="selectedComponent"
                    (redirect)="goTo({name:$event})">
            </info-route>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type === 'view'">
            <info-view
                    [view]="selectedComponent">
            </info-view>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type === 'menu'">
            <info-menu
                    [menu]="selectedComponent">
            </info-menu>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type === 'model'">
            <info-model
                    [model]="selectedComponent"
                    (getRef)="goTo($event)">
            </info-model>
        </ng-container>

        <ng-container *ngIf="selectedComponent.type === 'do' || selectedComponent.type === 'get'">
            <info-controller
                    [controller]="selectedComponent"
                    [fetch_error]="fetch_error"
                    [selected_package]="selectedComponent.package ? selectedComponent.package : ''"
                    [moving]="true"
                    (goto)="goTo({name:$event})">
            </info-controller>
        </ng-container>

    </div>

</div>
